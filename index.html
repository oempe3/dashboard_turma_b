<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Painel Operacional · Turma B · Manutenção & Operação</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --surface-0:#0b0f14;--surface-1:#11161d;--surface-2:#161d26;--surface-3:#1c2530;--surface-4:#222d3a;
  --line:rgba(255,255,255,.06);--line-strong:rgba(255,255,255,.12);
  --text:#e7ecf3;--text-mute:#9aa6b6;--text-dim:#6a7689;
  --op:#60a5fa;--op-2:#3b82f6;--op-soft:rgba(96,165,250,.12);
  --m-corr:#ef4444;--m-em:#dc2626;--m-pred:#f97316;--m-prev:#f59e0b;--m-serv:#eab308;--m-modi:#a16207;
  --maint:#a855f7;--maint-soft:rgba(168,85,247,.12);
  --radius-lg:20px;--radius-md:14px;--radius-sm:9px;
  --shadow-1:0 1px 0 rgba(255,255,255,.04) inset,0 8px 24px rgba(0,0,0,.35);
  --shadow-2:0 1px 0 rgba(255,255,255,.04) inset,0 16px 40px rgba(0,0,0,.45);
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:'Inter Tight',system-ui,sans-serif;background:radial-gradient(1100px 600px at 90% -10%,rgba(96,165,250,.07),transparent 60%),radial-gradient(900px 500px at -10% 110%,rgba(168,85,247,.07),transparent 60%),var(--surface-0);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;letter-spacing:.005em}
.appbar{position:sticky;top:0;z-index:30;background:rgba(11,15,20,.88);backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);border-bottom:1px solid var(--line)}
.appbar-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:10px 16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand-mark{width:32px;height:32px;border-radius:10px;background:conic-gradient(from 200deg,var(--op) 0deg,var(--maint) 140deg,var(--op) 360deg);position:relative;box-shadow:0 4px 12px rgba(96,165,250,.2),0 4px 12px rgba(168,85,247,.15);flex-shrink:0}
.brand-mark::after{content:"";position:absolute;inset:5px;border-radius:6px;background:var(--surface-1)}
.brand-text{display:flex;flex-direction:column;line-height:1.05;min-width:0}
.brand-text .t{font-family:'Outfit',sans-serif;font-weight:700;font-size:15px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand-text .s{font-size:9px;color:var(--text-mute);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
.appbar-spacer{flex:1}
.appbar-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.btn-refresh{appearance:none;border:1px solid var(--line-strong);background:var(--surface-2);color:var(--text);font-family:'Inter Tight',sans-serif;font-size:12px;font-weight:600;padding:7px 13px;border-radius:999px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .25s ease;white-space:nowrap}
.btn-refresh:hover{background:var(--surface-3);border-color:var(--op);color:var(--op)}
.btn-refresh.loading{pointer-events:none;opacity:.7}
.btn-refresh.loading .ico{animation:spin .8s linear infinite}
.btn-refresh.done{border-color:rgba(34,197,94,.4);color:#22c55e}
.btn-refresh .ico{width:14px;height:14px;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.op-filter{display:flex;align-items:center;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:2px}
.op-filter select{appearance:none;background:transparent;color:var(--text);border:0;outline:0;font-family:inherit;font-size:12px;font-weight:500;padding:6px 24px 6px 11px;cursor:pointer;background-image:("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M1 3l4 4 4-4' stroke='%239aa6b6' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 7px center}
.op-filter select option{background:var(--surface-2);color:var(--text)}
.header-logos{display:flex;gap:7px;align-items:center;margin-left:6px}
.logo-img{width:26px;height:auto;filter:drop-shadow(0 0 3px rgba(0,0,0,.3))}
.header-logos a:last-child .logo-img{width:33px}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(80px);z-index:90;background:var(--surface-3);border:1px solid var(--line-strong);border-radius:12px;padding:9px 16px;font-size:12px;font-weight:500;box-shadow:var(--shadow-2);opacity:0;transition:all .4s cubic-bezier(.2,.8,.2,1);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{border-color:rgba(239,68,68,.4);color:#fca5a5}
.toast.success{border-color:rgba(34,197,94,.4);color:#86efac}
.tabs-wrap{max-width:1400px;margin:0 auto;padding:12px 16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs-wrap::-webkit-scrollbar{height:0}
.tabs{display:flex;gap:5px;background:var(--surface-1);border:1px solid var(--line);padding:4px;border-radius:13px;width:max-content;min-width:100%}
.tab{appearance:none;border:0;background:transparent;color:var(--text-mute);font-family:'Outfit',sans-serif;font-weight:600;font-size:11px;letter-spacing:.02em;padding:8px 14px;border-radius:9px;cursor:pointer;transition:all .25s ease;display:flex;flex-direction:column;align-items:center;gap:1px;line-height:1.1;white-space:nowrap}
.tab .tab-sub{font-size:9px;font-weight:500;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase}
.tab:hover{color:var(--text);background:rgba(255,255,255,.03)}
.tab.active{background:linear-gradient(180deg,rgba(96,165,250,.18),rgba(96,165,250,.06));color:var(--text);box-shadow:0 0 0 1px rgba(96,165,250,.35) inset,0 4px 14px rgba(96,165,250,.10)}
.tab.active .tab-sub{color:var(--op)}
.tab.tab-anual{background:linear-gradient(180deg,rgba(245,158,11,.14),rgba(96,165,250,.08))}
.tab.tab-anual.active{background:linear-gradient(180deg,rgba(245,158,11,.26),rgba(96,165,250,.16));box-shadow:0 0 0 1px rgba(245,158,11,.35) inset,0 4px 14px rgba(245,158,11,.12)}
.tab.tab-new{animation:tabPulse 2s ease-in-out 3}
@keyframes tabPulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 2px rgba(34,197,94,.5),0 0 16px rgba(34,197,94,.15)}}
.main{max-width:1400px;margin:0 auto;padding:12px 16px 60px}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin:10px 2px 10px;flex-wrap:wrap}
.section-head h2{font-family:'Outfit',sans-serif;font-weight:700;font-size:20px;letter-spacing:-.015em;margin:0}
.section-head .sub{font-size:11px;color:var(--text-mute)}
.pill{display:inline-flex;align-items:center;gap:5px;background:var(--surface-2);border:1px solid var(--line);padding:4px 9px;border-radius:999px;font-size:10px;color:var(--text-mute);font-weight:500}
.pill .dot{width:6px;height:6px;border-radius:99px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:9px;margin-top:8px}
.kpi{position:relative;overflow:hidden;background:var(--surface-1);border:1px solid var(--line);border-radius:var(--radius-lg);padding:13px 13px 11px;box-shadow:var(--shadow-1);transition:transform .35s cubic-bezier(.2,.8,.2,1),border-color .25s;animation:kpiIn .55s cubic-bezier(.2,.8,.2,1) both}
.kpi:nth-child(1){animation-delay:.02s}.kpi:nth-child(2){animation-delay:.07s}.kpi:nth-child(3){animation-delay:.12s}.kpi:nth-child(4){animation-delay:.17s}.kpi:nth-child(5){animation-delay:.22s}.kpi:nth-child(6){animation-delay:.27s}
.kpi:hover{transform:translateY(-2px);border-color:var(--line-strong)}
@keyframes kpiIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.kpi .label{font-size:9px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.12em;font-weight:600}
.kpi .value{font-family:'Outfit',sans-serif;font-weight:700;font-size:26px;letter-spacing:-.025em;margin-top:4px;line-height:1;display:flex;align-items:baseline;gap:4px}
.kpi .value .unit{font-size:11px;color:var(--text-mute);font-weight:500;letter-spacing:0}
.kpi .meta{font-size:10px;color:var(--text-dim);margin-top:3px}
.kpi .badge{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--surface-3);font-size:12px}
.kpi.kpi-op .badge{background:var(--op-soft);color:var(--op)}.kpi.kpi-manut .badge{background:var(--maint-soft);color:var(--maint)}
.kpi.kpi-op .value{color:var(--op)}.kpi.kpi-manut .value{color:var(--maint)}
.kpi.kpi-op::after,.kpi.kpi-manut::after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px}
.kpi.kpi-op::after{background:linear-gradient(90deg,var(--op),transparent)}.kpi.kpi-manut::after{background:linear-gradient(90deg,var(--maint),transparent)}
.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:12px;margin-top:12px}
@media(max-width:860px){.grid-2{grid-template-columns:1fr}}
.card{background:var(--surface-1);border:1px solid var(--line);border-radius:var(--radius-lg);padding:15px;box-shadow:var(--shadow-1)}
.card h3{font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;letter-spacing:-.01em;margin:0 0 3px}
.card .card-sub{font-size:10px;color:var(--text-mute);margin-bottom:12px}
.chart-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:9px}
.legend-item{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--text-mute)}
.legend-item .swatch{width:9px;height:9px;border-radius:2px;display:inline-block}
.legend-item .swatch.op{background:var(--op)}.legend-item .swatch.manut{background:var(--maint)}
.chart-scroll{overflow-x:auto;overflow-y:visible;padding-bottom:5px;-webkit-overflow-scrolling:touch}
.chart-scroll::-webkit-scrollbar{height:5px}.chart-scroll::-webkit-scrollbar-track{background:transparent}.chart-scroll::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:4px}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:220px;padding:10px 4px 26px;position:relative;min-width:100%}
.bar-grid{position:absolute;left:30px;right:0;top:10px;bottom:26px;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}
.bar-grid .gline{height:1px;background:var(--line);position:relative}
.bar-grid .gline::before{content:attr(data-v);position:absolute;left:-27px;top:-6px;font-size:8px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.bar-col{flex:1 1 0;min-width:16px;max-width:50px;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;height:100%;padding-left:1px;padding-right:1px}
.bar-stack{flex:1;width:100%;display:flex;flex-direction:column;justify-content:flex-end;gap:2px}
.bar-pair{display:flex;gap:2px;width:100%;flex:1;align-items:flex-end}
.bar{flex:1;border-radius:4px 4px 2px 2px;position:relative;cursor:pointer;transition:filter .15s ease,transform .15s ease;min-height:0;animation:barRise .6s cubic-bezier(.2,.8,.2,1) both}
.bar:hover{filter:brightness(1.18);transform:translateY(-1px)}
.bar.bar-op{background:linear-gradient(180deg,var(--op),var(--op-2));box-shadow:0 0 8px rgba(96,165,250,.18)}
.bar.bar-manut{background:linear-gradient(180deg,var(--m-prev),var(--m-modi));box-shadow:0 0 8px rgba(245,158,11,.18)}
@keyframes barRise{from{opacity:0;transform:scaleY(.2);transform-origin:bottom}to{opacity:1;transform:scaleY(1)}}
.bar-label{font-size:8px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);white-space:nowrap}
.os-rich-tip{position:fixed;z-index:85;background:rgba(17,22,29,.97);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px 14px;min-width:240px;max-width:400px;box-shadow:0 16px 40px rgba(0,0,0,.5);font-size:11px;pointer-events:none;opacity:0;transform:translateY(6px);transition:opacity .15s ease,transform .15s ease;color:#e7ecf3}
.os-rich-tip.show{opacity:1;transform:translateY(0)}
.os-rich-tip-head{font-family:'Outfit',sans-serif;font-weight:700;font-size:12px;margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:7px}
.os-rich-tip-row{display:grid;grid-template-columns:72px 1fr auto;gap:5px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:center}
.os-rich-tip-row:last-child{border-bottom:none}
.os-num{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:10px;color:#60a5fa}
.os-desc{font-size:10px;color:#9aa6b6;line-height:1.3}
.os-loc{font-size:9px;color:#6a7689}
.os-st{font-size:9px;font-weight:600;padding:1px 4px;border-radius:3px;white-space:nowrap}
.st-concluida{background:rgba(34,197,94,.15);color:#22c55e}
.st-andamento{background:rgba(96,165,250,.15);color:#60a5fa}
.st-aprovada{background:rgba(168,85,247,.15);color:#a855f7}
.st-aguardando{background:rgba(239,68,68,.15);color:#ef4444}
.st-programada{background:rgba(245,158,11,.15);color:#f59e0b}
.os-rich-tip-foot{margin-top:7px;padding-top:5px;border-top:1px solid rgba(255,255,255,.06);font-size:10px;color:#6a7689;display:flex;justify-content:space-between;align-items:center}
.tooltip{position:fixed;z-index:80;background:rgba(17,22,29,.96);backdrop-filter:blur(10px);border:1px solid var(--line-strong);border-radius:11px;padding:9px 11px;min-width:200px;box-shadow:var(--shadow-2);color:var(--text);font-size:11px;pointer-events:none;opacity:0;transform:translateY(4px);transition:opacity .12s ease,transform .12s ease}
.tooltip.show{opacity:1;transform:translateY(0)}
.tt-head{display:flex;justify-content:space-between;align-items:baseline;font-family:'Outfit',sans-serif;font-weight:700;font-size:12px;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.tt-head .dia{color:var(--text-mute);font-size:9px;font-weight:500}
.tt-section{margin-top:6px}.tt-section:first-of-type{margin-top:0}
.tt-section-title{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.tt-section-title .dot{width:5px;height:5px;border-radius:2px}
.tt-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;font-size:11px}
.tt-row .lhs{display:flex;align-items:center;gap:5px}
.tt-row .swatch{width:7px;height:7px;border-radius:2px;display:inline-block}
.tt-row .name{color:var(--text-mute)}.tt-row .val{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--text)}
.tt-total{margin-top:6px;padding-top:6px;border-top:1px dashed var(--line);display:flex;justify-content:space-between;font-weight:700;font-size:11px}
.copy-btn{appearance:none;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:3px 5px;border-radius:5px;background:var(--surface-2);color:var(--text-mute);font-size:11px;transition:all .2s ease;flex-shrink:0}
.copy-btn:hover{background:var(--surface-3);color:var(--op)}
.os-list{display:flex;flex-direction:column;gap:5px}
.os-item{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:9px;background:var(--surface-2);border:1px solid var(--line);transition:all .2s ease;cursor:pointer}
.os-item:hover{border-color:var(--line-strong);transform:translateX(2px)}
.os-item .dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.os-item .label{flex:1;font-weight:600;font-size:11px;display:flex;flex-direction:column;gap:1px}
.os-item .label .full{font-size:8px;font-weight:500;color:var(--text-dim);letter-spacing:.04em;text-transform:uppercase}
.os-item .count{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px}
.os-summary{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;margin-bottom:9px}
.os-summary .label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-mute);font-weight:600}
.os-summary .val{font-family:'Outfit',sans-serif;font-weight:700;font-size:22px;letter-spacing:-.02em}
.breakdown{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:10px}
.bd-row{display:flex;align-items:center;gap:7px;padding:7px 9px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px}
.bd-row .swatch{width:5px;height:18px;border-radius:2px;flex-shrink:0}
.bd-row .info{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0}
.bd-row .name{font-size:10px;font-weight:600;color:var(--text)}
.bd-row .full{font-size:9px;color:var(--text-dim)}
.bd-row .v{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:11px}
.empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:12px}
.footer{max-width:1400px;margin:0 auto;padding:18px 16px 40px;border-top:1px solid var(--line);margin-top:20px;font-size:10px;color:var(--text-dim);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.footer code{font-family:'JetBrains Mono',monospace;background:var(--surface-2);padding:1px 4px;border-radius:4px;color:var(--text-mute)}
.date-filter{display:flex;gap:6px;margin-bottom:7px;flex-wrap:wrap;font-size:10px;align-items:center}
.date-filter label{display:flex;align-items:center;gap:3px;color:var(--text-mute)}
.date-filter input[type="text"]{background:var(--surface-2);color:var(--text);border:1px solid var(--line);padding:4px 7px;border-radius:7px;font-size:10px;font-family:"JetBrains Mono",monospace;width:88px;letter-spacing:.03em}
.date-filter input[type="text"]::placeholder{color:var(--text-dim)}
.date-filter button{appearance:none;border:1px solid var(--line-strong);background:var(--surface-2);color:var(--text);font-size:10px;font-weight:600;padding:4px 9px;border-radius:999px;cursor:pointer;transition:all .2s ease;white-space:nowrap}
.date-filter button:hover{background:var(--surface-3);border-color:var(--op);color:var(--op)}
.monthly-board{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:9px}
.month-card{background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:11px;transition:border-color .2s}
.month-card:hover{border-color:var(--line-strong)}
.month-card .mc-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:12px;margin-bottom:7px;color:var(--text)}
.month-card .mc-row{display:flex;justify-content:space-between;font-size:10px;padding:2px 0;color:var(--text-mute)}
.month-card .mc-val{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--text)}
.month-card .mc-ader{font-size:12px;font-weight:700;margin-top:5px;padding-top:5px;border-top:1px solid var(--line)}
.hint{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:var(--surface-3);color:var(--text-mute);font-size:9px;font-weight:700;margin-left:6px;cursor:help;vertical-align:middle;flex-shrink:0}
@media(max-width:680px){
  .appbar-inner{padding:8px 12px;gap:7px}
  .brand-text .t{font-size:13px}.brand-text .s{display:none}
  .header-logos .logo-img{width:20px}.header-logos a:last-child .logo-img{width:26px}
  .tabs-wrap,.main,.footer{padding-left:12px;padding-right:12px}
  .tab{padding:7px 10px;font-size:10px}
  .kpi{padding:10px}.kpi .value{font-size:20px}
  .card{padding:12px}.breakdown{grid-template-columns:1fr}
  .section-head h2{font-size:17px}
  .grid-2{gap:9px}
  .monthly-board{grid-template-columns:repeat(2,1fr)}
  .bar-chart{height:180px}
  .kpis{gap:7px}
  .os-summary .val{font-size:18px}
  .btn-refresh .txt{display:none}
}
@media(max-width:420px){
  .kpis{grid-template-columns:1fr 1fr}
  .breakdown{grid-template-columns:1fr}
  .monthly-board{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<header class="appbar">
  <div class="appbar-inner">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-text">
        <div class="t">Painel Operacional – Turma B</div>
        <div class="s">Operação · Manutenção · OS</div>
      </div>

<script>
(function(){
"use strict";
const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbzxTtJee2IrxWY76rHZxLTwW5vYJ8ZQocxjD2vrY46k_tZHh_0iecvFFnAEqPMGovEVLg/exec";
const TIPOS_MANUT=["CORR","EM","PRED","PREV","SERV","MODI"];
const ALL_TIPOS=["OPER",...TIPOS_MANUT];
const MANUT_LABELS={CORR:{nome:"Corretiva",cor:"var(--m-corr)"},EM:{nome:"Emergencial",cor:"var(--m-em)"},PRED:{nome:"Preditiva",cor:"var(--m-pred)"},PREV:{nome:"Preventiva",cor:"var(--m-prev)"},SERV:{nome:"Serviços",cor:"var(--m-serv)"},MODI:{nome:"Modificativa",cor:"var(--m-modi)"}};
const OPER_LABEL={nome:"Operacional",cor:"var(--op)"};
const MES_NOMES={"01":"Janeiro","02":"Fevereiro","03":"Março","04":"Abril","05":"Maio","06":"Junho","07":"Julho","08":"Agosto","09":"Setembro","10":"Outubro","11":"Novembro","12":"Dezembro"};
let DATA={operadores:[],meses:[],dados:{},os_details:{}};
const state={mes:"",operador:"_ALL",startDate:null,endDate:null};
function fmtH(v){if(!v)return"0h";const h=Math.floor(v),m=Math.round((v-h)*60);return m===0?h+"h":h+"h "+String(m).padStart(2,"0")+"m"}
function fmtNum(v,d){return Number(v||0).toFixed(d||0).replace(".",",")}
function formatMesLabel(ym){if(ym==="ANUAL")return{top:"Anual",sub:"Consolidado"};const[a,m]=ym.split("-");return{top:MES_NOMES[m]||m,sub:a}}
function $(id){return document.getElementById(id)}
let toastTimer;
function showToast(msg,type){const t=$("toast");t.textContent=msg;t.className="toast "+(type||"")+" show";clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),4000)}

async function fetchScript(){
  // Apps Script requer redirect:follow e não precisa de mode:cors explícito
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),90000);
  try{
    const r=await fetch(APPS_SCRIPT_URL+"?_="+Date.now(),{
      method:"GET",
      redirect:"follow",
      signal:ctrl.signal
    });
    clearTimeout(timer);
    const text=await r.text();
    // Limpar possíveis prefixos de segurança do Apps Script
    const clean=text.replace(/^\)\]\}'[\r\n]*/,'').trim();
    return JSON.parse(clean);
  }finally{clearTimeout(timer);}
}

async function refreshData(){
  const btn=$("btnRefresh");btn.classList.add("loading");btn.querySelector(".txt").textContent="Buscando…";
  showToast("⏳ Lendo planilhas do Google Drive…","");
  try{
    const json=await fetchScript();
    if(json.error) throw new Error(json.error);
    if(json.operadores) DATA.operadores=json.operadores;
    if(json.meses) DATA.meses=json.meses;
    if(json.dados) Object.assign(DATA.dados,json.dados);
    if(json.os_details) Object.assign(DATA.os_details,json.os_details);
    buildFilter();buildTabs();
    if(!DATA.dados[state.mes]) state.mes=DATA.meses[DATA.meses.length-1];
    render();
    $("lastSync").textContent="Atualizado em "+new Date().toLocaleString("pt-BR");
    $("footStats").textContent=DATA.meses.length+" meses · "+(DATA.operadores||[]).length+" operadores";
    showToast("✓ Dados atualizados com sucesso","success");
    btn.classList.add("done");btn.querySelector(".txt").textContent="Atualizado ✓";
  }catch(e){
    console.error("Refresh:",e);showToast("Erro: "+String(e.message).substring(0,65),"error");
    btn.querySelector(".txt").textContent="Atualizar";
  }finally{
    btn.classList.remove("loading");
    setTimeout(()=>{btn.classList.remove("done");btn.querySelector(".txt").textContent="Atualizar"},7000);
  }
}
$("btnRefresh").addEventListener("click",refreshData);

function buildTabs(highlightNew){
  const root=$("tabs");root.innerHTML="";
  const items=[...DATA.meses,"ANUAL"];const newSet=new Set(highlightNew||[]);
  items.forEach(ym=>{
    const lbl=formatMesLabel(ym);const b=document.createElement("button");
    let cls="tab";if(ym==="ANUAL")cls+=" tab-anual";if(ym===state.mes)cls+=" active";if(newSet.has(ym))cls+=" tab-new";
    b.className=cls;b.dataset.ym=ym;
    b.innerHTML='<span>'+lbl.top+'</span><span class="tab-sub">'+lbl.sub+'</span>';
    b.addEventListener("click",()=>{state.mes=ym;document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.ym===ym));render()});
    root.appendChild(b);
  });
}

function buildFilter(){
  const sel=$("operFilter");const current=sel.value||"_ALL";
  sel.innerHTML='<option value="_ALL">Todos os operadores</option>';
  (DATA.operadores||[]).forEach(op=>{const o=document.createElement("option");o.value=op;o.textContent=op.replace(/\./g," ");sel.appendChild(o)});
  sel.value=current;sel.onchange=e=>{state.operador=e.target.value;render()};
}

    +'<div class="kpi kpi-manut"><div class="badge">🛠</div><div class="label">Horas manutenção</div><div class="value">'+fmtNum(b.horas_manut)+'<span class="unit">h</span></div><div class="meta">'+fmtH(b.horas_manut)+' · 6 tipos</div></div>'
    +'<div class="kpi"><div class="badge">📅</div><div class="label">Dias trabalhados</div><div class="value">'+dias+'<span class="unit">dias</span></div><div class="meta">com lançamento</div></div>'
    +'<div class="kpi"><div class="badge">⏱</div><div class="label">Horas totais ×8h</div><div class="value">'+ht+'<span class="unit">h</span></div><div class="meta">'+dias+' dias × 8h</div></div>'

/* Aderência fixa:
   _ALL:       126h por mês
   individual: 42h por operador/mês       */
function calcAder(b){
  const isSingle=state.operador&&state.operador!=='_ALL';
  const hhProg=isSingle?42:126;
  const hhApt=b.horas_manut||0;
  const pct=hhProg>0?Math.round((hhApt/hhProg)*100):0;
  return{hhProg,hhApt,pct,fator:hhProg,isSingle};
}

function renderHHPanel(b){
  const {hhProg,hhApt,pct,fator,isSingle}=calcAder(b);
  const cor=pct>=100?'#22c55e':(pct>=80?'#f59e0b':'#ef4444');
  const label=pct>=100?'Meta atingida ✓':(pct>=80?'Abaixo do previsto':'Crítico');
  const barW=Math.min(pct,100);
  const hhOper=b.horas_oper||0;const tipos=b.tipos||{};
  const tiposInfo=[{k:'CORR',nome:'Corretiva',cor:'var(--m-corr)'},{k:'EM',nome:'Emergencial',cor:'var(--m-em)'},{k:'PRED',nome:'Preditiva',cor:'var(--m-pred)'},{k:'PREV',nome:'Preventiva',cor:'var(--m-prev)'},{k:'SERV',nome:'Serviços',cor:'var(--m-serv)'},{k:'MODI',nome:'Modificativa',cor:'var(--m-modi)'}];
  const subtipos=tiposInfo.filter(t=>(tipos[t.k]||0)>0).map(t=>{
    const v=tipos[t.k]||0;const p=hhApt>0?Math.round((v/hhApt)*100):0;
    return '<div style="display:flex;align-items:center;gap:7px;padding:5px 9px;background:var(--surface-2);border:1px solid var(--line);border-radius:7px">'
      +'<span style="width:4px;height:18px;border-radius:2px;background:'+t.cor+';flex-shrink:0"></span>'
      +'<span style="flex:1;font-size:10px;color:var(--text-mute)">'+t.k+' · '+t.nome+'</span>'
      +'<span style="font-family:JetBrains Mono,monospace;font-size:10px;font-weight:600">'+v.toFixed(0)+'h</span>'
      +'<span style="font-size:9px;color:var(--text-dim);min-width:28px;text-align:right">'+p+'%</span>'
    +'</div>';
  }).join('');
  const formulaStr=isSingle?'HH planejado fixo: 42h por operador/mês':'HH planejado fixo: 126h por mês';
  const ttStr='Aderência = HH manutenção apontada / HH planejada. '+formulaStr+'. HH Programado = '+hhProg.toFixed(2)+'h';
  return '<div class="card" style="margin-top:12px">'
    +'<h3>HH Apontado × Programado<span class="hint" title="'+ttStr+'">?</span></h3>'
    +'<div class="card-sub" style="margin-bottom:10px">Manutenção apontada vs meta planejada</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">'
      +'<div style="background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:10px;text-align:center">'
        +'<div style="font-size:9px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px">HH Programado</div>'
        +'<div style="font-family:Outfit,sans-serif;font-size:22px;font-weight:700;color:var(--op)">'+fmtNum(hhProg,2)+'<span style="font-size:10px;color:var(--text-mute);font-weight:400">h</span></div>'
        +'<div style="font-size:9px;color:var(--text-dim);margin-top:2px">'+(isSingle?'42h por operador':'126h por mês')+'</div>'
      +'</div>'
      +'<div style="background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:10px;text-align:center">'
        +'<div style="font-size:9px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px">HH Apontado (MNT)</div>'
        +'<div style="font-family:Outfit,sans-serif;font-size:22px;font-weight:700;color:var(--maint)">'+hhApt.toFixed(0)+'<span style="font-size:10px;color:var(--text-mute);font-weight:400">h</span></div>'
        +'<div style="font-size:9px;color:var(--text-dim);margin-top:2px">só manutenção · OPER excluído</div>'
      +'</div>'
      +'<div style="background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:10px;text-align:center">'
        +'<div style="font-size:9px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px">Aderência HH</div>'
        +'<div style="font-family:Outfit,sans-serif;font-size:22px;font-weight:700;color:'+cor+'">'+pct+'<span style="font-size:10px;font-weight:400">%</span></div>'
        +'<div style="font-size:9px;margin-top:2px;color:'+cor+'">'+label+'</div>'
      +'</div>'
    +'</div>'
    +'<div style="background:var(--surface-3);border-radius:999px;height:9px;overflow:hidden;margin-bottom:4px"><div style="height:100%;width:'+barW+'%;background:linear-gradient(90deg,'+cor+','+cor+'bb);border-radius:999px;transition:width .6s ease"></div></div>'
    +'<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text-dim);margin-bottom:12px"><span>0h</span><span>Meta: '+fmtNum(hhProg,2)+'h</span><span style="color:'+cor+'">'+hhApt.toFixed(0)+'h ('+pct+'%)</span></div>'
    +'<div style="font-size:9px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Detalhamento por tipo</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:4px">'+subtipos+'</div>'
    +'<div style="margin-top:8px;padding:6px 9px;background:var(--surface-2);border-radius:7px;font-size:9px;color:var(--text-dim)">ℹ️ OPER não entra no HH Apontado · OPER apontado: <strong style="color:var(--op)">'+hhOper.toFixed(0)+'h</strong></div>'
  +'</div>';
}

function renderChartFiltered(b,ym){
  let dias=b.por_dia;if(!dias||!dias.length) return '<div class="empty">Sem lançamentos</div>';
  let df=dias.map(d=>{
    let ds;
    if(ym!=='ANUAL'){ds=ym+'-'+String(d.dia).padStart(2,'0');}
    else if(String(d.dia).includes('-')){const p=String(d.dia).split('-');const yr=DATA.meses&&DATA.meses.length?DATA.meses[0].split('-')[0]:String(new Date().getFullYear());ds=yr+'-'+p[0].padStart(2,'0')+'-'+p[1].padStart(2,'0');}
    else{const yr=DATA.meses&&DATA.meses.length?DATA.meses[0].split('-')[0]:String(new Date().getFullYear());ds=yr+'-01-'+String(d.dia).padStart(2,'0');}
    return Object.assign({},d,{fullDate:ds});
  });
  if(state.startDate) df=df.filter(x=>x.fullDate>=state.startDate);
  if(state.endDate) df=df.filter(x=>x.fullDate<=state.endDate);
  if(!df.length) return '<div class="empty">Sem lançamentos no período</div>';
  let grouped=df;
  if(df.length>31){
    const seg=Math.ceil(df.length/31);grouped=[];
    for(let i=0;i<df.length;i+=seg){
      const sl=df.slice(i,i+seg);const g={};
      g.dia=sl[0].dia+'-'+sl[sl.length-1].dia;
      ALL_TIPOS.forEach(k=>{g[k]=sl.reduce((s,x)=>s+(x[k]||0),0)});
      g.oper_total=sl.reduce((s,x)=>s+(x.oper_total||0),0);
      g.manut_total=sl.reduce((s,x)=>s+(x.manut_total||0),0);
      grouped.push(g);
    }
  }
  let max=0;grouped.forEach(d=>{const t=(d.oper_total||0)+(d.manut_total||0);if(t>max)max=t});
  if(!max)max=8;const topo=Math.ceil(max/4)*4||4;
  const gv=[topo,topo*.75,topo*.5,topo*.25,0];
  const gh=gv.map(v=>'<div class="gline" data-v="'+fmtNum(v)+'h"></div>').join('');
  const cols=grouped.map((d,i)=>{
    const opPct=(d.oper_total/topo)*100,mPct=(d.manut_total/topo)*100;
    const dd=JSON.stringify(d).replace(/"/g,'&quot;');
    const lbl=ym==='ANUAL'?d.dia:String(d.dia).replace(/^0/,'');
    return '<div class="bar-col"><div class="bar-stack"><div class="bar-pair">'
      +'<div class="bar bar-op" style="height:'+opPct+'%;animation-delay:'+i*10+'ms" data-day="'+dd+'"></div>'
      +'<div class="bar bar-manut" style="height:'+mPct+'%;animation-delay:'+(i*10+5)+'ms" data-day="'+dd+'"></div>'
      +'</div></div><div class="bar-label">'+lbl+'</div></div>';
  }).join('');
  const minW=Math.max(grouped.length*28,400);
  return '<div class="chart-legend"><span class="legend-item"><span class="swatch op"></span>Operação</span><span class="legend-item"><span class="swatch manut"></span>Manutenção</span></div>'
    +'<div class="chart-scroll"><div class="bar-chart" style="min-width:'+minW+'px;padding-left:34px"><div class="bar-grid">'+gh+'</div>'+cols+'</div></div>';
}

function formatOSCopy(lista){if(!lista||!lista.length)return '';return lista.map((n,i)=>i===0?String(n):',='+String(n)).join('')}

function renderOS(b){
  const tipos=[{k:"OPER",...OPER_LABEL},{k:"CORR",...MANUT_LABELS.CORR},{k:"EM",...MANUT_LABELS.EM},{k:"PRED",...MANUT_LABELS.PRED},{k:"PREV",...MANUT_LABELS.PREV},{k:"SERV",...MANUT_LABELS.SERV},{k:"MODI",...MANUT_LABELS.MODI}];
  const rows=tipos.map(t=>{
    const c=b.os_por_tipo[t.k]||0;if(!c)return'';
    const lista=(b.os_lists&&b.os_lists[t.k]&&Array.isArray(b.os_lists[t.k]))?b.os_lists[t.k]:[];
    const copyVal=lista.length?formatOSCopy(lista):'';
    return '<div class="os-item" data-type="'+t.k+'">'
      +'<span class="dot" style="background:'+t.cor+'"></span>'
      +'<div class="label"><span>'+t.k+'</span><span class="full">'+t.nome+'</span></div>'
      +'<span class="count">'+c+'</span>'
      +(lista.length?'<button class="copy-btn" data-copy="'+copyVal.replace(/"/g,'&quot;')+'" title="Copiar OS de '+t.nome+' — formato ,=">📋</button>':'')
    +'</div>';
  }).join('')||'<div class="empty">Nenhuma OS</div>';
  const allLists=Object.values(b.os_lists||{}).flat();
  const uniq=[...new Set(allLists)];
  const copyAll=formatOSCopy(uniq);
  return '<div class="os-summary">'
    +'<span class="label">Total de OS</span>'
    +'<span class="val">'+b.total_os+'</span>'
    +(uniq.length?'<button class="copy-btn" data-copy="'+copyAll.replace(/"/g,'&quot;')+'" title="Copiar todas as OS — formato ,=" style="margin-left:auto">📋 Todas</button>':'')
  +'</div>'
  +'<div class="os-list">'+rows+'</div>';
}

function renderBreakdown(b){
  return '<div class="breakdown">'+TIPOS_MANUT.map(k=>{
    const v=b.tipos[k]||0;if(!v)return'';
    const m=MANUT_LABELS[k];
    const lista=(b.os_lists&&b.os_lists[k])?b.os_lists[k]:[];
    const nOS=(b.os_por_tipo&&b.os_por_tipo[k])||0;
    const copyVal=lista.length?formatOSCopy(lista):'';
    return '<div class="bd-row">'
      +'<span class="swatch" style="background:'+m.cor+'"></span>'
      +'<div class="info"><span class="name">'+k+'</span><span class="full">'+m.nome+(nOS?' · '+nOS+' OS':'')+'</span></div>'
      +'<span class="v">'+fmtNum(v)+'h</span>'
      +(lista.length?'<button class="copy-btn" data-copy="'+copyVal.replace(/"/g,'&quot;')+'" title="Copiar OS de '+m.nome+' — formato ,=">📋</button>':'')
    +'</div>';
  }).filter(Boolean).join('')+'</div>';
}

function renderMonthlyBoard(){
  const meses=Array.isArray(DATA.meses)?DATA.meses:[];
  const cards=meses.filter(m=>m&&m!=='ANUAL').map(m=>{
    const md=DATA.dados&&DATA.dados[m]&&DATA.dados[m][state.operador];if(!md)return'';
    const[ano,mm]=String(m).split('-');
    const label=(MES_NOMES[mm]||mm)+' '+ano;
    const hO=md.horas_oper||0,hM=md.horas_manut||0,hT=md.horas_total||(hO+hM);
    const osCnt=md.total_os||0,dias=md.dias_trabalhados||0;
    const isSingle=state.operador&&state.operador!=='_ALL';
    const hhProg=isSingle?42:126;
    const aderPct=hhProg>0?(hM/hhProg)*100:0;
    const aderCor=aderPct>=100?'#22c55e':(aderPct>=80?'#f59e0b':'#ef4444');
    return '<div class="month-card">'
      +'<div class="mc-title">'+label+'</div>'
      +'<div class="mc-row"><span>Operação</span><span class="mc-val">'+hO.toFixed(0)+'h</span></div>'
      +'<div class="mc-row"><span>Manutenção</span><span class="mc-val">'+hM.toFixed(0)+'h</span></div>'
      +'<div class="mc-row"><span>Total</span><span class="mc-val">'+hT.toFixed(0)+'h</span></div>'
      +'<div class="mc-row"><span>OS</span><span class="mc-val">'+osCnt+'</span></div>'
      +'<div class="mc-row"><span>Dias</span><span class="mc-val">'+dias+'</span></div>'
      +'<div class="mc-ader" style="color:'+aderCor+'">Aderência: '+aderPct.toFixed(0)+'%</div>'
    +'</div>';
  }).filter(Boolean);
  if(!cards.length)return'';
  return '<div class="card" style="margin-top:12px">'
    +'<h3>Resumo mensal<span class="hint" title="Aderência calculada com HH planejada fixa: 126h/mês para todos os operadores e 42h/mês por operador.">?</span></h3>'
    +'<div class="card-sub">Evolução por mês — filtro por operador aplicado</div>'
    +'<div class="monthly-board">'+cards.join('')+'</div>'
    +'</div>';
}

function renderGaugeCard(b){
  const dias=b.dias_trabalhados||0,carga=dias*8;
  const oper=b.horas_oper||0,manut=b.horas_manut||0;
  const restante=Math.max(0,carga-(oper+manut)),uteis=dias*7;
  let pO=carga>0?(oper/carga)*100:0,pM=carga>0?(manut/carga)*100:0;
  const sum=pO+pM;let pR=100-Math.min(sum,100);
  if(sum>100){const f=100/sum;pO*=f;pM*=f;pR=0;}
  const pU=carga>0?(uteis/carga)*100:0;
  let bar='<div style="position:relative;background:var(--surface-3);height:10px;border-radius:6px;overflow:hidden">';
  if(pO>0)bar+='<div style="float:left;width:'+pO.toFixed(2)+'%;height:100%;background:var(--op)"></div>';
  if(pM>0)bar+='<div style="float:left;width:'+pM.toFixed(2)+'%;height:100%;background:var(--maint)"></div>';
  if(pR>0)bar+='<div style="float:left;width:'+pR.toFixed(2)+'%;height:100%;background:var(--surface-2)"></div>';
  bar+='</div>';
  const marker=pU>0&&pU<=100?'<div style="position:absolute;left:'+pU.toFixed(2)+'%;top:-2px;bottom:-2px;width:2px;background:var(--text-mute);opacity:.6;border-radius:1px" title="Meta útil '+uteis+'h"></div>':'';
  return '<div class="card" style="margin-top:12px">'
    +'<h3>Resumo de horas<span class="hint" title="Barra empilhada: azul=OPER, roxo=MNT, cinza=restante. Linha tracejada=meta útil (7h×dias). Carga teórica=8h×dias.">?</span></h3>'
    +'<div class="card-sub">Horas lançadas vs carga teórica (8h×dias)</div>'
    +'<div style="position:relative;margin:8px 0">'+bar+marker+'</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:8px;font-size:9px;color:var(--text-dim)">'
      +'<span><span style="display:inline-block;width:6px;height:6px;background:var(--op);border-radius:1px;margin-right:2px"></span>OPER: '+oper.toFixed(0)+'h</span>'
      +'<span><span style="display:inline-block;width:6px;height:6px;background:var(--maint);border-radius:1px;margin-right:2px"></span>MNT: '+manut.toFixed(0)+'h</span>'
      +'<span><span style="display:inline-block;width:6px;height:6px;background:var(--surface-3);border:1px solid var(--line-strong);border-radius:1px;margin-right:2px"></span>Rest: '+restante.toFixed(0)+'h</span>'
      +'<span style="margin-left:auto">Carga: '+carga.toFixed(0)+'h | Meta útil: '+uteis.toFixed(0)+'h</span>'
    +'</div>'
  +'</div>';
}

function bindDateFilter(){
  const s=document.getElementById('startDate'),e=document.getElementById('endDate');
  const btn=document.getElementById('applyDateFilter'),cl=document.getElementById('clearDateFilter');
  if(!s||!e||!btn)return;

  // Converte YYYY-MM-DD (interno) → DD/MM/AAAA (exibição)
  function toDisplay(iso){if(!iso)return'';const p=iso.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
  // Converte DD/MM/AAAA → YYYY-MM-DD (interno para comparação)
  function toISO(br){
    const m=br.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if(!m)return null;
    return m[3]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[1]).padStart(2,'0');
  }
  // Máscara automática: insere / ao digitar
  function applyMask(input){
    input.addEventListener('input',function(){
      let v=this.value.replace(/\D/g,'');
      if(v.length>2)v=v.slice(0,2)+'/'+v.slice(2);
      if(v.length>5)v=v.slice(0,5)+'/'+v.slice(5);
      if(v.length>10)v=v.slice(0,10);
      this.value=v;
    });
  }
  applyMask(s);applyMask(e);

  // Restaurar valores salvos no state (internamente YYYY-MM-DD)
  if(state.startDate)s.value=toDisplay(state.startDate);
  if(state.endDate)e.value=toDisplay(state.endDate);

  btn.onclick=()=>{
    const si=toISO(s.value),ei=toISO(e.value);
    if(s.value&&!si){showToast('Data "De" inválida — use DD/MM/AAAA','error');return}
    if(e.value&&!ei){showToast('Data "Até" inválida — use DD/MM/AAAA','error');return}
    state.startDate=si||null;state.endDate=ei||null;render();
  };
  if(cl)cl.onclick=()=>{state.startDate=null;state.endDate=null;s.value='';e.value='';render()};
}

function bindCopyButtons(){
  document.querySelectorAll('.copy-btn').forEach(btn=>{
    btn.onclick=async function(ev){
      ev.stopPropagation();
      const val=btn.getAttribute('data-copy')||'';
      if(!val){showToast('Nenhuma OS para copiar','');return;}
      try{
        await navigator.clipboard.writeText(val);showToast('✓ Copiado para a área de transferência!','success');
      }catch(err){
        try{const ta=document.createElement('textarea');ta.style.cssText='position:fixed;opacity:0;left:0;top:0';ta.value=val;document.body.appendChild(ta);ta.focus();ta.select();const ok=document.execCommand('copy');document.body.removeChild(ta);if(ok)showToast('✓ Copiado!','success');else showToast('Falha ao copiar','error');}
        catch(e2){showToast('Falha ao copiar','error');}
      }
    };
  });
}

const osRichTip=$("osRichTip");
function statusClass(st){if(!st)return'';const s=st.toLowerCase();if(s.includes('conclu'))return'st-concluida';if(s.includes('andamento'))return'st-andamento';if(s.includes('aprovad'))return'st-aprovada';if(s.includes('aguard'))return'st-aguardando';if(s.includes('program'))return'st-programada';return''}
function buildRichTip(lista,tipo,cor){
  if(!lista||!lista.length)return null;
  const det=DATA.os_details||{};
  const rows=lista.slice(0,15).map(osn=>{const d=det[String(osn)]||{};const desc=d.desc||d.descricao||'—';const loc=d.local||d.site||'—';const st=d.status||d.situacao||'—';return'<div class="os-rich-tip-row"><span class="os-num">'+osn+'</span><div><div class="os-desc">'+desc+'</div><div class="os-loc">'+loc+'</div></div><span class="os-st '+statusClass(st)+'">'+st+'</span></div>'}).join('');
  const extra=lista.length>15?lista.length-15:0;const copyFmt=formatOSCopy(lista);
  return '<div class="os-rich-tip-head"><span style="width:7px;height:7px;border-radius:2px;background:'+cor+';display:inline-block"></span><span>'+tipo+'</span><span style="margin-left:auto;font-size:9px;color:var(--text-dim)">'+lista.length+' OS</span></div>'
    +rows+(extra?'<div style="font-size:9px;color:var(--text-dim);padding:3px 0">... e mais '+extra+' OS</div>':'')
    +'<div class="os-rich-tip-foot"><button class="copy-btn" data-copy="'+copyFmt.replace(/"/g,'&quot;')+'" style="background:transparent;border:1px solid var(--line);color:inherit;cursor:pointer;padding:2px 6px;border-radius:4px;font-size:9px">📋 Copiar números</button><span>'+lista.length+' registros</span></div>';
}
function placeRichTip(e){if(!osRichTip)return;const tw=osRichTip.offsetWidth,th=osRichTip.offsetHeight;let x=e.clientX+14,y=e.clientY-th/2;if(x+tw>window.innerWidth-14)x=e.clientX-tw-14;if(y<6)y=6;if(y+th>window.innerHeight-6)y=window.innerHeight-th-6;osRichTip.style.left=x+'px';osRichTip.style.top=y+'px'}
function bindOSTooltips(){
  document.querySelectorAll('.os-item[data-type]').forEach(item=>{
    const tipo=item.dataset.type||'';
    const show=e=>{
      const b=DATA.dados[state.mes]&&DATA.dados[state.mes][state.operador];if(!b)return;
      const lista=(b.os_lists&&b.os_lists[tipo])?b.os_lists[tipo]:[];if(!lista.length)return;
      const dot=item.querySelector('.dot');const cor=dot?dot.style.background:'var(--op)';
      const lbl=MANUT_LABELS[tipo]||OPER_LABEL;const content=buildRichTip(lista,tipo+' · '+lbl.nome,cor);if(!content)return;
      osRichTip.innerHTML=content;bindCopyButtons();osRichTip.classList.add('show');placeRichTip(e);
    };
    item.addEventListener('mouseenter',show);item.addEventListener('mousemove',placeRichTip);item.addEventListener('mouseleave',()=>osRichTip.classList.remove('show'));
    item.addEventListener('touchstart',e=>{show(e.touches[0]);const t=e.touches[0];osRichTip.style.left=Math.min(t.clientX+8,window.innerWidth-260)+'px';osRichTip.style.top=Math.max(t.clientY-110,6)+'px';setTimeout(()=>osRichTip.classList.remove('show'),3000);},{passive:true});
  });
}

const tip=$("tooltip");
function bindTooltips(){document.querySelectorAll(".bar-chart .bar").forEach(bar=>{bar.addEventListener("mouseenter",onBarEnter);bar.addEventListener("mousemove",onBarMove);bar.addEventListener("mouseleave",onBarLeave)})}
function onBarEnter(e){const d=JSON.parse(e.currentTarget.dataset.day.replace(/&quot;/g,'"'));tip.innerHTML=buildTT(d);tip.classList.add("show");placeT(e)}
function onBarMove(e){placeT(e)}
function onBarLeave(){tip.classList.remove("show")}
function placeT(e){const tw=tip.offsetWidth,th=tip.offsetHeight;let x=e.clientX+11,y=e.clientY-th-9;if(x+tw>window.innerWidth-11)x=e.clientX-tw-11;if(y<11)y=e.clientY+13;tip.style.left=x+"px";tip.style.top=y+"px"}
function buildTT(day){
  let diaTxt;if(String(day.dia).includes('-')){const p=String(day.dia).split('-');diaTxt=p[1].padStart(2,'0')+'/'+p[0].padStart(2,'0');}else{const[a,m]=state.mes.split('-');diaTxt=String(day.dia).padStart(2,'0')+'/'+(m||'??')+'/'+(a||'??');}
  const opH=day.OPER||0;
  const md=TIPOS_MANUT.map(t=>{const v=day[t]||0;if(!v)return'';const m=MANUT_LABELS[t];return'<div class="tt-row"><div class="lhs"><span class="swatch" style="background:'+m.cor+'"></span><span class="name">'+t+' · '+m.nome+'</span></div><span class="val">'+fmtH(v)+'</span></div>'}).join('');
  const total=(day.oper_total||0)+(day.manut_total||0);
  let h='<div class="tt-head"><span>Detalhes</span><span class="dia">'+diaTxt+'</span></div>';
  if(opH>0)h+='<div class="tt-section"><div class="tt-section-title"><span class="dot" style="background:var(--op)"></span>Operação</div><div class="tt-row"><div class="lhs"><span class="swatch" style="background:var(--op)"></span><span class="name">OPER</span></div><span class="val">'+fmtH(opH)+'</span></div></div>';
  if(md)h+='<div class="tt-section"><div class="tt-section-title"><span class="dot" style="background:var(--maint)"></span>Manutenção</div>'+md+'</div>';
  h+='<div class="tt-total"><span>Total</span><span class="val">'+fmtH(total)+'</span></div>';
  return h;
}

function render(){
  const b=DATA.dados[state.mes]&&DATA.dados[state.mes][state.operador];
  if(!b){$("main").innerHTML='<div class="empty" style="padding:60px">Sem dados para esta seleção. Clique em "Atualizar" para buscar dados do Google Drive.</div>';return}
  const lbl=formatMesLabel(state.mes);
  const opTitle=state.operador==='_ALL'?'Todos os operadores':state.operador.replace(/\./g,' ');
  $("main").innerHTML=
    '<div class="section-head"><div><h2>'+lbl.top+' <span style="color:var(--text-dim);font-weight:500">· '+lbl.sub+'</span></h2><div class="sub">'+opTitle+' · '+b.total_os+' OS · '+fmtNum(b.horas_total)+'h registradas</div></div><div style="display:flex;gap:5px;flex-wrap:wrap"><span class="pill"><span class="dot" style="background:var(--op)"></span>'+fmtNum(b.horas_oper)+'h oper</span><span class="pill"><span class="dot" style="background:var(--maint)"></span>'+fmtNum(b.horas_manut)+'h mnt</span></div></div>'
    +renderKPIs(b)
    +renderGaugeCard(b)
    +renderHHPanel(b)
    +'<div class="grid-2">'
      +'<div class="card"><h3>Horas por dia<span class="hint" title="Azul=OPER, roxo=manutenção. Passe o mouse para detalhes. Filtre por período com os campos abaixo.">?</span></h3>'
        +'<div class="date-filter"><label>De: <input type="text" id="startDate" placeholder="DD/MM/AAAA" maxlength="10"></label><label>Até: <input type="text" id="endDate" placeholder="DD/MM/AAAA" maxlength="10"></label><button id="applyDateFilter">Aplicar</button><button id="clearDateFilter">Limpar</button></div>'
        +'<div class="card-sub">Operação vs. manutenção por dia</div>'
        +renderChartFiltered(b,state.mes)
      +'</div>'
      +'<div class="card"><h3>OS por tipo<span class="hint" title="Ordens de Serviço distintas por tipo. Passe o mouse para ver detalhes. Clique 📋 para copiar no formato ,= para o Maximo.">?</span></h3>'
        +'<div class="card-sub">Quantidade de OS distintas — mouse para detalhes, 📋 para copiar</div>'
        +renderOS(b)
      +'</div>'
    +'</div>'
    +'<div class="card" style="margin-top:12px"><h3>Detalhamento · Manutenção<span class="hint" title="Horas por tipo. Clique 📋 para copiar OS no formato ,=">?</span></h3><div class="card-sub">Horas totais em cada categoria</div>'+renderBreakdown(b)+'</div>'
    +renderMonthlyBoard();

  bindTooltips();bindDateFilter();bindCopyButtons();bindOSTooltips();
}

(async function init(){
  $("main").innerHTML='<div class="empty" style="padding:60px">⏳ Carregando dados do Google Drive…<br><small style="color:var(--text-dim);margin-top:8px;display:block">Aguarde ou clique em "Atualizar".</small></div>';
  try{
    const json=await fetchScript();
    if(json.error) throw new Error(json.error);
    if(json.operadores)DATA.operadores=json.operadores;
    if(json.meses)DATA.meses=json.meses;
    if(json.dados)DATA.dados=json.dados;
    if(json.os_details)DATA.os_details=json.os_details;
    state.mes=DATA.meses[DATA.meses.length-1]||'';
    buildFilter();buildTabs();render();
    $("lastSync").textContent='Atualizado em '+new Date().toLocaleString('pt-BR');
    $("footStats").textContent=DATA.meses.length+' meses · '+(DATA.operadores||[]).length+' operadores';
  }catch(e){
    console.warn('Auto-load:',e);
    $("main").innerHTML='<div class="empty" style="padding:60px">⚠️ Não foi possível carregar automaticamente.<br><small style="color:var(--text-dim);margin-top:8px;display:block">Clique em "Atualizar" para tentar novamente.<br>Erro: '+e.message+'</small></div>';
  }
})();

window.addEventListener("scroll",()=>tip.classList.remove("show"),{passive:true});
window.addEventListener("resize",()=>tip.classList.remove("show"));
})();
</script>
